<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學中文 · Học Tiếng Trung</title>
<style>
  /* ── DESIGN TOKENS ─────────────────────────────────────── */
  :root {
    --ink:    #1a1a2e;
    --paper:  #f7f6f2;
    --muted:  #8a8a99;
    --border: #e2e0d8;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,.09);

    /* lesson palette */
    --l7a:#e07b39; --l7b:#fff3eb; --l7c:#fde8d3;
    --l8a:#3a8c5c; --l8b:#eaf6ef; --l8c:#c8ecd7;
    --l9a:#5465d4; --l9b:#edf0ff; --l9c:#ccd2f7;
    --l10a:#c0435e;--l10b:#fff0f3;--l10c:#f7c2cc;
    --l11a:#8b5cf6;--l11b:#f3eeff;--l11c:#ddccfb;
    --l12a:#0f9b8e;--l12b:#e8f9f6;--l12c:#bfeee7;
    --l13a:#b8860b;--l13b:#fdf6e3;--l13c:#f3e2ad;
    --l1a:#c0392b; --l1b:#fdecea; --l1c:#f8cfc9;
    --l2a:#d35400; --l2b:#fdf0e4; --l2c:#f9d9b8;
    --l3a:#c99a06; --l3b:#fef8e7; --l3c:#f2e2a8;
    --l4a:#27ae60; --l4b:#eafaf1; --l4c:#c8f0da;
    --l5a:#16a085; --l5b:#e8f8f5; --l5c:#c3ecdf;
    --l6a:#2980b9; --l6b:#eaf4fb; --l6c:#c6e3f5;
    --l14a:#7f8c8d;--l14b:#f2f4f4;--l14c:#dbdfdf;
    --l15a:#34495e;--l15b:#eaedf0;--l15c:#c7cdd3;

    --active:#5465d4;
    --correct:#3a8c5c;
    --wrong:#c0435e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;}

  /* ── TOPBAR ────────────────────────────────────────────── */
  #topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:10px 14px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  #topbar h1{font-size:1.1rem;font-weight:800;letter-spacing:-.5px;flex:1;}
  #streak-badge{background:var(--l7c);padding:4px 10px;border-radius:20px;font-size:.82rem;font-weight:700;color:var(--l7a);}
  .pinyin-toggle{background:var(--l9b);color:var(--l9a);border:none;padding:5px 11px;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;}
  .speed-control{display:flex;align-items:center;gap:5px;background:var(--paper);border-radius:20px;padding:3px 10px;}
  .speed-control label{font-size:.72rem;font-weight:700;color:var(--muted);}
  .speed-control input[type=range]{width:60px;accent-color:var(--active);cursor:pointer;}
  .speed-val{font-size:.72rem;font-weight:700;color:var(--active);min-width:28px;}

  /* ── NAV TABS ──────────────────────────────────────────── */
  #nav{display:flex;overflow-x:auto;gap:4px;padding:10px 14px 0;background:#fff;border-bottom:1px solid var(--border);}
  #nav button{flex-shrink:0;padding:7px 13px;border:none;background:none;font-size:.78rem;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:all .15s;}
  #nav button.active{color:var(--active);border-color:var(--active);}

  /* ── MAIN CONTENT ──────────────────────────────────────── */
  #content{padding:14px;max-width:700px;margin:0 auto;}

  /* ── CARDS / PANELS ────────────────────────────────────── */
  .panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
  #auth-gate{position:fixed;inset:0;background:var(--paper);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;width:100%;max-width:360px;}
  .auth-title{font-size:1.3rem;font-weight:900;text-align:center;margin-bottom:4px;}
  .auth-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:20px;}
  .auth-tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--paper);border-radius:10px;padding:4px;}
  .auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-weight:700;font-size:.85rem;color:var(--muted);cursor:pointer;}
  .auth-tab.active{background:var(--active);color:#fff;}
  .auth-field{margin-bottom:12px;}
  .auth-field label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:5px;}
  .auth-field input{width:100%;padding:10px 12px;border:1.5px solid #e3e3ec;border-radius:10px;font-size:.95rem;box-sizing:border-box;}
  .auth-field input:focus{outline:none;border-color:var(--active);}
  .auth-error{background:#fdecea;color:#c0392b;font-size:.8rem;font-weight:600;padding:8px 10px;border-radius:8px;margin-bottom:12px;display:none;}
  .auth-error.show{display:block;}
  .auth-submit{width:100%;padding:11px;border:none;border-radius:10px;background:var(--active);color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;margin-top:4px;}
  .auth-submit:disabled{opacity:.6;cursor:default;}
  .auth-guest{width:100%;padding:9px;border:none;background:none;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;margin-top:10px;text-decoration:underline;}
  #user-badge{background:var(--l11c);padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:700;color:var(--l11a);cursor:pointer;border:none;}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#3a8c5c;margin-right:4px;vertical-align:middle;}
  .sync-dot.offline{background:#c0392b;}
  .panel-title{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}

  /* ── LESSON FILTER ─────────────────────────────────────── */
  #lesson-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .lbtn{padding:6px 14px;border-radius:20px;border:2px solid;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;}

  /* ── Bảng chọn Quyển/nhóm từ vựng ─────────────────────── */
  .book-group{margin-bottom:12px;}
  .book-group-label{font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.02em;}
  .book-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .book-card{position:relative;flex:1 1 100px;max-width:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 8px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;}
  .book-card:active{transform:scale(.96);}
  .book-card.sel{border-color:var(--active);background:var(--active);box-shadow:0 3px 10px rgba(84,101,212,.35);}
  .book-card.sel .book-card-name{color:#fff;}
  .book-card.sel .book-card-count{color:rgba(255,255,255,.85);}
  .book-card.locked{opacity:.5;}
  .book-card-name{font-weight:800;font-size:.87rem;color:var(--ink);text-align:center;}
  .book-card-count{font-size:.68rem;color:var(--muted);font-weight:600;}
  .book-card-lock{position:absolute;top:6px;right:8px;font-size:.7rem;}
  .lbtn[data-l="0"]{border-color:var(--active);background:var(--l9b);color:var(--l9a);}
  .lbtn[data-l="1"]{border-color:var(--l1a);background:var(--l1b);color:var(--l1a);}
  .lbtn[data-l="2"]{border-color:var(--l2a);background:var(--l2b);color:var(--l2a);}
  .lbtn[data-l="3"]{border-color:var(--l3a);background:var(--l3b);color:var(--l3a);}
  .lbtn[data-l="4"]{border-color:var(--l4a);background:var(--l4b);color:var(--l4a);}
  .lbtn[data-l="5"]{border-color:var(--l5a);background:var(--l5b);color:var(--l5a);}
  .lbtn[data-l="6"]{border-color:var(--l6a);background:var(--l6b);color:var(--l6a);}
  .lbtn[data-l="14"]{border-color:var(--l14a);background:var(--l14b);color:var(--l14a);}
  .lbtn[data-l="15"]{border-color:var(--l15a);background:var(--l15b);color:var(--l15a);}
  .lbtn[data-l="7"]{border-color:var(--l7a);background:var(--l7b);color:var(--l7a);}
  .lbtn[data-l="8"]{border-color:var(--l8a);background:var(--l8b);color:var(--l8a);}
  .lbtn[data-l="9"]{border-color:var(--l9a);background:var(--l9b);color:var(--l9a);}
  .lbtn[data-l="10"]{border-color:var(--l10a);background:var(--l10b);color:var(--l10a);}
  .lbtn[data-l="11"]{border-color:var(--l11a);background:var(--l11b);color:var(--l11a);}
  .lbtn[data-l="12"]{border-color:var(--l12a);background:var(--l12b);color:var(--l12a);}
  .lbtn[data-l="13"]{border-color:var(--l13a);background:var(--l13b);color:var(--l13a);}
  .lbtn.sel{color:#fff!important;}
  .lbtn[data-l="0"].sel{background:var(--active);}
  .lbtn[data-l="1"].sel{background:var(--l1a);}
  .lbtn[data-l="2"].sel{background:var(--l2a);}
  .lbtn[data-l="3"].sel{background:var(--l3a);}
  .lbtn[data-l="4"].sel{background:var(--l4a);}
  .lbtn[data-l="5"].sel{background:var(--l5a);}
  .lbtn[data-l="6"].sel{background:var(--l6a);}
  .lbtn[data-l="14"].sel{background:var(--l14a);}
  .lbtn[data-l="15"].sel{background:var(--l15a);}
  .lbtn[data-l="7"].sel{background:var(--l7a);}
  .lbtn[data-l="8"].sel{background:var(--l8a);}
  .lbtn[data-l="9"].sel{background:var(--l9a);}
  .lbtn[data-l="10"].sel{background:var(--l10a);}
  .lbtn[data-l="11"].sel{background:var(--l11a);}
  .lbtn[data-l="12"].sel{background:var(--l12a);}
  .lbtn[data-l="13"].sel{background:var(--l13a);}

  /* ── PROGRESS BARS ─────────────────────────────────────── */
  .prog-row{margin-bottom:10px;}
  .prog-label{display:flex;justify-content:space-between;font-size:.78rem;font-weight:600;margin-bottom:4px;}
  .prog-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:4px;transition:width .4s;}
  .prog-fill[data-l="1"]{background:var(--l1a);}
  .prog-fill[data-l="2"]{background:var(--l2a);}
  .prog-fill[data-l="3"]{background:var(--l3a);}
  .prog-fill[data-l="4"]{background:var(--l4a);}
  .prog-fill[data-l="5"]{background:var(--l5a);}
  .prog-fill[data-l="6"]{background:var(--l6a);}
  .prog-fill[data-l="14"]{background:var(--l14a);}
  .prog-fill[data-l="15"]{background:var(--l15a);}
  .prog-fill[data-l="7"]{background:var(--l7a);}
  .prog-fill[data-l="8"]{background:var(--l8a);}
  .prog-fill[data-l="9"]{background:var(--l9a);}
  .prog-fill[data-l="10"]{background:var(--l10a);}
  .prog-fill[data-l="11"]{background:var(--l11a);}
  .prog-fill[data-l="12"]{background:var(--l12a);}
  .prog-fill[data-l="13"]{background:var(--l13a);}

  /* ── FLASHCARD ─────────────────────────────────────────── */
  .fc-wrap{perspective:900px;height:290px;cursor:pointer;margin-bottom:16px;}
  .fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;}
  .fc-inner.flipped{transform:rotateY(180deg);}
  .fc-front,.fc-back{position:absolute;inset:0;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;backface-visibility:hidden;}
  .fc-back{transform:rotateY(180deg);}
  .fc-hz{font-size:3.2rem;font-weight:900;line-height:1;}
  .fc-hz-back{font-size:2.1rem;font-weight:900;line-height:1;}
  .fc-py{font-size:1rem;color:var(--muted);font-style:italic;}
  .fc-vi{font-size:1.3rem;font-weight:700;text-align:center;padding:0 16px;}
  .fc-lesson-tag{position:absolute;top:10px;right:10px;font-size:.7rem;font-weight:800;padding:3px 9px;border-radius:12px;}
  .fc-hint{font-size:.75rem;color:var(--muted);position:absolute;bottom:10px;}
  .fc-controls{display:flex;gap:10px;justify-content:center;}
  .fc-btn{padding:10px 24px;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;}
  .btn-ok{background:var(--l8c);color:var(--l8a);}
  .btn-fail{background:var(--l10c);color:var(--l10a);}
  .btn-sound{background:var(--l9b);color:var(--l9a);padding:8px 14px;}
  .fc-counter{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:10px;}
  .fc-parts-wrap{width:100%;max-height:78px;overflow-y:auto;padding:6px 16px;box-sizing:border-box;}
  .fc-parts-title{font-size:.66rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
  .fc-parts-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:3px;font-size:.74rem;line-height:1.3;}
  .fc-parts-char{font-weight:900;font-size:1.05rem;min-width:24px;flex-shrink:0;}
  .fc-parts-comps{flex:1;color:var(--ink);}
  .fc-parts-chip{display:inline-block;background:var(--paper);border-radius:6px;padding:1px 6px;margin:0 3px 2px 0;font-weight:700;}
  .fc-parts-note{color:var(--muted);font-style:italic;}

  /* ── QUIZ ──────────────────────────────────────────────── */
  .quiz-q{font-size:1.5rem;font-weight:800;text-align:center;padding:24px 16px;min-height:90px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
  .quiz-sub{font-size:.85rem;color:var(--muted);font-weight:400;}
  .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .quiz-opt{padding:13px 10px;background:var(--paper);border:2px solid var(--border);border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
  .quiz-opt.correct{background:var(--l8c);border-color:var(--l8a);color:var(--l8a);}
  .quiz-opt.wrong{background:var(--l10c);border-color:var(--l10a);color:var(--l10a);}
  .quiz-type-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .quiz-type-btn{padding:5px 12px;border-radius:16px;border:2px solid var(--border);background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;}
  .quiz-type-btn.active{background:var(--active);color:#fff;border-color:var(--active);}

  /* ── TYPE INPUT ────────────────────────────────────────── */
  .type-q{text-align:center;padding:20px 16px;}
  .type-hz-big{font-size:2.2rem;font-weight:900;}
  .type-input{width:100%;padding:12px;font-size:1.1rem;border:2px solid var(--border);border-radius:10px;outline:none;text-align:center;font-family:inherit;}
  .type-input:focus{border-color:var(--active);}
  .type-feedback{padding:12px;border-radius:10px;text-align:center;font-size:.95rem;font-weight:700;margin-top:8px;}
  .type-feedback.ok{background:var(--l8c);color:var(--l8a);}
  .type-feedback.bad{background:var(--l10c);color:var(--l10a);}

  /* ── LISTEN ────────────────────────────────────────────── */
  .listen-sentence{font-size:1rem;color:var(--muted);text-align:center;padding:0 16px;margin-bottom:6px;font-style:italic;}
  .listen-play{font-size:2.5rem;cursor:pointer;text-align:center;padding:18px;display:block;}
  .listen-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .listen-opt{padding:14px 8px;border:2px solid var(--border);background:var(--paper);border-radius:10px;font-size:1.2rem;font-weight:700;cursor:pointer;text-align:center;}
  .listen-opt.correct{background:var(--l8c);border-color:var(--l8a);color:var(--l8a);}
  .listen-opt.wrong{background:var(--l10c);border-color:var(--l10a);color:var(--l10a);}

  /* ── TRANSLATE ─────────────────────────────────────────── */
  .trans-vi{font-size:1.05rem;font-weight:700;margin-bottom:8px;line-height:1.5;}
  .trans-hint{font-size:.78rem;color:var(--active);margin-bottom:10px;}
  .trans-input{width:100%;min-height:60px;padding:10px;font-size:1rem;border:2px solid var(--border);border-radius:10px;outline:none;font-family:inherit;resize:vertical;}
  .trans-input:focus{border-color:var(--active);}
  .trans-answer{margin-top:8px;padding:10px;background:var(--l9b);border-radius:8px;font-size:1rem;font-weight:700;color:var(--l9a);display:none;}
  .trans-self-btns{display:flex;gap:8px;margin-top:8px;}

  /* ── EXAM ──────────────────────────────────────────────── */
  .exam-result{text-align:center;padding:20px;}
  .exam-score{font-size:3rem;font-weight:900;color:var(--active);}
  .exam-rank{font-size:1.2rem;font-weight:700;margin:8px 0;}
  .exam-miss{margin-top:16px;text-align:left;}
  .exam-miss-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:var(--l10b);margin-bottom:6px;font-size:.9rem;}

  /* ── STATS ─────────────────────────────────────────────── */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .stat-box{background:var(--paper);border-radius:10px;padding:12px;text-align:center;}
  .stat-num{font-size:1.6rem;font-weight:900;color:var(--active);}
  .stat-lbl{font-size:.7rem;color:var(--muted);font-weight:600;}
  .weak-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--paper);margin-bottom:6px;}
  .weak-hz{font-size:1.3rem;font-weight:900;min-width:40px;}
  .weak-info{flex:1;font-size:.82rem;color:var(--muted);}
  .bar-chart{display:flex;align-items:flex-end;gap:8px;height:80px;margin-top:10px;}
  .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;}
  .bar-fill{width:100%;border-radius:4px 4px 0 0;}
  .bar-lbl{font-size:.65rem;font-weight:700;color:var(--muted);}
  .bar-pct{font-size:.65rem;font-weight:700;}

  /* ── DICTIONARY ────────────────────────────────────────── */
  .dict-search{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:.95rem;outline:none;font-family:inherit;margin-bottom:12px;}
  .dict-search:focus{border-color:var(--active);}
  .dict-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border-bottom:1px solid var(--border);}
  .dict-hz{font-size:1.6rem;font-weight:900;min-width:52px;}
  .dict-py{font-size:.82rem;color:var(--muted);font-style:italic;}
  .dict-vi{font-size:.9rem;font-weight:600;flex:1;}
  .dict-tag{font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:8px;margin-left:4px;}

  /* ── HSK4 PROGRESS ─────────────────────────────────────── */
  .hsk-hero{text-align:center;padding:6px 0 14px;}
  .hsk-hero-num{font-size:2.6rem;font-weight:900;color:var(--active);line-height:1;}
  .hsk-hero-sub{font-size:.85rem;color:var(--muted);font-weight:600;margin-top:4px;}
  .hsk-bigbar{height:14px;background:var(--paper);border-radius:8px;overflow:hidden;margin-top:12px;}
  .hsk-bigbar-fill{height:100%;background:linear-gradient(90deg,var(--active),#8b5cf6);border-radius:8px;transition:width .5s;}
  .hsk-level-row{margin-bottom:14px;}
  .hsk-level-label{display:flex;justify-content:space-between;align-items:baseline;font-size:.85rem;font-weight:700;margin-bottom:5px;}
  .hsk-level-label .lv{color:var(--ink);}
  .hsk-level-label .ct{color:var(--muted);font-weight:600;font-size:.78rem;}
  .hsk-note{font-size:.78rem;color:var(--muted);line-height:1.5;margin-top:4px;}

  /* ── GENERIC BUTTONS ───────────────────────────────────── */
  .btn{padding:11px 22px;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--active);color:#fff;}
  .btn-primary:hover{opacity:.88;}
  .btn-sm{padding:6px 14px;font-size:.8rem;}
  .btn-sound-sm{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px;}

  /* ── COMPARE / CONFUSABLE CHARS ───────────────────────── */
  .confuse-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
  .confuse-row{display:flex;justify-content:center;align-items:flex-start;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .confuse-item{flex:1;min-width:84px;max-width:140px;text-align:center;background:var(--bg);border-radius:10px;padding:10px 6px;border:2px solid var(--border);}

let authToken = localStorage.getItem('authToken') || null;
let authUsername = localStorage.getItem('authUsername') || null;
let isGuest = localStorage.getItem('authGuest') === '1';
let progressState = { srs: {}, streak: 0, lastDate: null };
let authMode = 'login'; // 'login' | 'register'
let syncTimer = null;
let syncOk = true;
let currentRole = 'user';   // 'user' | 'admin' | 'superadmin'
let currentRank = null;     // {name, icon, next:{name,icon,remain}|null}
function isAdminRole() { return currentRole === 'admin' || currentRole === 'superadmin'; }

function authHeaders() {
  return authToken ? { 'Authorization': 'Bearer ' + authToken } : {};
}

function authSwitchTab(mode) {
  authMode = mode;
  document.getElementById('auth-tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('auth-tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'Đăng nhập' : 'Đăng ký';
  document.getElementById('auth-error').classList.remove('show');
}

function authShowError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}

async function authSubmit() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-submit');
  if (!username || !password) { authShowError('Vui lòng nhập đầy đủ thông tin'); return; }
  btn.disabled = true;
  const oldLabel = btn.textContent; btn.textContent = 'Đang xử lý...';
  try {
    const res = await fetch('/api/' + authMode, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!data.ok) { authShowError(data.error || 'Có lỗi xảy ra'); return; }
    authToken = data.token; authUsername = data.username; isGuest = false;
    localStorage.setItem('authToken', authToken);
    localStorage.setItem('authUsername', authUsername);
    localStorage.removeItem('authGuest');
    progressState = data.progress || { srs: {}, streak: 0, lastDate: null };
    currentRole = data.role || 'user';
    currentRank = data.rank || null;
    cacheProgressLocally();
    closeAuthGate();
    render();
  } catch (e) {
    authShowError('Không kết nối được máy chủ. Kiểm tra mạng và thử lại.');
  } finally {
    btn.disabled = false; btn.textContent = oldLabel;
  }
}

function authContinueAsGuest() {
  isGuest = true;
  localStorage.setItem('authGuest', '1');
  authToken = null; authUsername = null;
  currentRole = 'user'; currentRank = null;
  localStorage.removeItem('authToken'); localStorage.removeItem('authUsername');
  progressState = loadGuestProgressLocally();
  closeAuthGate();
  render();
}

function authOpenMenu() {
  if (isGuest || !authUsername) { openAuthGate(); return; }
  document.getElementById('account-menu-name').textContent = '👤 ' + authUsername;
  document.getElementById('account-menu').style.display = 'flex';
}
function closeAccountMenu() { document.getElementById('account-menu').style.display = 'none'; }

function openChangePassword() {
  document.getElementById('pw-old').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-new2').value = '';
  document.getElementById('pw-error').classList.remove('show');
  document.getElementById('pw-modal').style.display = 'flex';
}
function closeChangePassword() { document.getElementById('pw-modal').style.display = 'none'; }

async function submitChangePassword() {
  const oldPassword = document.getElementById('pw-old').value;
  const newPassword = document.getElementById('pw-new').value;
  const newPassword2 = document.getElementById('pw-new2').value;
  const errEl = document.getElementById('pw-error');
  const showErr = (msg) => { errEl.textContent = msg; errEl.classList.add('show'); };
  if (!oldPassword || !newPassword) return showErr('Vui lòng nhập đủ thông tin.');
  if (newPassword.length < 4) return showErr('Mật khẩu mới cần tối thiểu 4 ký tự.');
  if (newPassword !== newPassword2) return showErr('Mật khẩu mới nhập lại không khớp.');
  const btn = document.getElementById('pw-submit');
  btn.disabled = true; btn.textContent = 'Đang xử lý...';
  try {
    const res = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ oldPassword, newPassword }),
    });
    const data = await res.json();
    if (!data.ok) { showErr(data.error || 'Đổi mật khẩu thất bại.'); return; }
    closeChangePassword();
    alert('✅ Đổi mật khẩu thành công!');
  } catch (e) {
    showErr('Lỗi kết nối: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Đổi mật khẩu';
  }
}

async function authLogout() {
  try { await fetch('/api/logout', { method: 'POST', headers: authHeaders() }); } catch {}
  authToken = null; authUsername = null; isGuest = false;
  currentRole = 'user'; currentRank = null;
  localStorage.removeItem('authToken'); localStorage.removeItem('authUsername'); localStorage.removeItem('authGuest');
  progressState = { srs: {}, streak: 0, lastDate: null };
  openAuthGate();
}

function openAuthGate() {
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('auth-username').value = '';
  document.getElementById('auth-password').value = '';
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('tab-admin').style.display = 'none';
}
function closeAuthGate() {
  document.getElementById('auth-gate').style.display = 'none';
  updateUserBadge();
  document.getElementById('tab-admin').style.display = (!isGuest && isAdminRole()) ? '' : 'none';
}
function updateUserBadge() {
  const badge = document.getElementById('user-badge');
  if (!badge) return;
  if (isGuest) { badge.innerHTML = '👤 Khách (chỉ lưu máy này)'; return; }
  const rankIcon = currentRank ? currentRank.icon + ' ' : '';
  badge.innerHTML = rankIcon + '👤 ' + authUsername + (currentRole === 'superadmin' ? ' 👑🛠️' : currentRole === 'admin' ? ' 🛠️' : '');
}

// Khách (không đăng nhập): vẫn lưu localStorage như trước, riêng theo trình duyệt
function loadGuestProgressLocally() {
  try { return JSON.parse(localStorage.getItem('guestProgress') || 'null') || { srs: {}, streak: 0, lastDate: null }; }
  catch { return { srs: {}, streak: 0, lastDate: null }; }
}
function cacheProgressLocally() {
  if (isGuest) { localStorage.setItem('guestProgress', JSON.stringify(progressState)); return; }
  if (authUsername) localStorage.setItem('progressCache_' + authUsername, JSON.stringify(progressState));
}

// Đồng bộ lên server (gộp các lần lưu liên tiếp trong 700ms để đỡ tốn request)
function scheduleSync() {
  if (isGuest || !authToken) return;
  syncOk = null; updateSyncIndicator();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify(progressState),
      });
      const data = await res.json();
      syncOk = !!data.ok;
      if (data.rank) { currentRank = data.rank; updateUserBadge(); }
    } catch { syncOk = false; }
    updateSyncIndicator();
  }, 700);
}
function updateSyncIndicator() {
  const badge = document.getElementById('user-badge');
  if (!badge || isGuest || !authUsername) return;
  const dot = syncOk === false ? '<span class="sync-dot offline"></span>' : (syncOk === null ? '' : '<span class="sync-dot"></span>');
  const rankIcon = currentRank ? currentRank.icon + ' ' : '';
  badge.innerHTML = dot + rankIcon + '👤 ' + authUsername + (currentRole === 'superadmin' ? ' 👑🛠️' : currentRole === 'admin' ? ' 🛠️' : '');
}

// Khởi động: kiểm tra token còn hiệu lực không, hoặc dùng chế độ khách
async function bootAuth() {
  if (isGuest) {
    progressState = loadGuestProgressLocally();
    closeAuthGate();
    return;
  }
  if (authToken && authUsername) {
    try {
      const res = await fetch('/api/progress', { headers: authHeaders() });
      const data = await res.json();
      if (data.ok) {
        progressState = data.progress || { srs: {}, streak: 0, lastDate: null };
        currentRole = data.role || 'user';
        currentRank = data.rank || null;
        cacheProgressLocally();
        closeAuthGate();
        return;
      }
    } catch {
      // Server không phản hồi được nhưng vẫn còn cache local -> cho vào tạm bằng cache, có thể đồng bộ lại sau
      const cached = localStorage.getItem('progressCache_' + authUsername);
      if (cached) {
        try { progressState = JSON.parse(cached); closeAuthGate(); syncOk = false; return; } catch {}
      }
    }
  }
  openAuthGate();
}

// SRS (đọc/ghi qua progressState, tự đồng bộ server theo tài khoản)
// ════════════════════════════════════════════════════
function getSRS() { return progressState.srs || (progressState.srs = {}); }
function saveSRS(d) { progressState.srs = d; cacheProgressLocally(); scheduleSync(); }

function getWordSRS(hz) {
  const d = getSRS(); return d[hz] || {correct:0, total:0, step:0, nextReview:0};
}

function recordAnswer(hz, isCorrect) {
  const d = getSRS();
  if (!d[hz]) d[hz] = {correct:0, total:0, step:0, nextReview:0};
  const w = d[hz];
  w.total++;
  if (isCorrect) {
    w.correct++;
    const steps = [10*60,60*60,24*60*60,3*24*60*60,7*24*60*60];
    w.step = Math.min(w.step + 1, steps.length);
    w.nextReview = Date.now() + (steps[w.step - 1] || steps[steps.length-1]) * 1000;
  } else {
    w.step = 0;
    w.nextReview = Date.now() + 60*1000;
  }
  d[hz] = w; saveSRS(d);
  updateStreak();
}

function updateStreak() {
  const today = new Date().toDateString();
  const last = progressState.lastDate;
  let streak = progressState.streak || 0;
  if (last === today) return streak;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (last === yesterday) { streak++; }
  else { streak = 1; }
  progressState.streak = streak;
  progressState.lastDate = today;
  cacheProgressLocally();
  scheduleSync();
  return streak;
}

function getStreak() { return progressState.streak || 0; }

function sortByPriority(words) {
  const now = Date.now();
  const d = getSRS();
  return [...words].sort((a, b) => {
    const wa = d[a.hz] || {nextReview:0, correct:0, total:1};
    const wb = d[b.hz] || {nextReview:0, correct:0, total:1};
    const aDue = wa.nextReview <= now ? 1 : 0;
    const bDue = wb.nextReview <= now ? 1 : 0;
    if (aDue !== bDue) return bDue - aDue;
    const ar = wa.total ? wa.correct/wa.total : 1;
    const br = wb.total ? wb.correct/wb.total : 1;
    return ar - br;
  });
}

function getKnownCount(lesson) {
  const d = getSRS();
  const words = lesson === 0 ? WORDS : WORDS.filter(w => w.l === lesson);
  return words.filter(w => {
    const s = d[w.hz]; return s && s.step >= 3;
  }).length;
}

let ttsVoice = null;
let ttsRate = 0.65;

function initTTS() {
  const load = () => {
    const voices = speechSynthesis.getVoices();
    // Priority: female zh-CN voices
    const femaleKeywords = ['female','woman','girl','Xiaoyi','Xiaoxiao','HuiHui','Yaoyao','Tracy','Meijia','Tingting','Hanhan'];
    const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
    // Try to find a female voice
    let pick = null;
    for (const kw of femaleKeywords) {
      pick = zhVoices.find(v => v.name.toLowerCase().includes(kw.toLowerCase()));
      if (pick) break;
    }
    // Fallback: any zh voice, prefer name containing 'CN'
    if (!pick) pick = zhVoices.find(v => v.lang === 'zh-CN') || zhVoices[0] || null;
    ttsVoice = pick;
    console.log('[TTS] selected voice:', ttsVoice ? ttsVoice.name : 'none', '| all zh voices:', zhVoices.map(v=>v.name));
  };
  speechSynthesis.onvoiceschanged = load;
  load();
}
initTTS();

function updateSpeed(val) {
  ttsRate = parseFloat(val);
  const el = document.getElementById('speed-val');
  if (el) el.textContent = ttsRate.toFixed(2);
}

// Split text into natural phrase chunks at Chinese punctuation + commas
function splitPhrases(text) {
  // Split at：，。！？、；— keep delimiter with preceding chunk
  const parts = [];
  let buf = '';
  for (let i = 0; i < text.length; i++) {
    buf += text[i];
    if ('，。！？、；…—,!?;'.includes(text[i])) {
      parts.push(buf.trim());
      buf = '';
    }
  }
  if (buf.trim()) parts.push(buf.trim());
  return parts.filter(Boolean);
}

// Speak with natural phrasing: queue utterances with micro-pauses between chunks
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();

  const phrases = splitPhrases(text);

  // If single short word, just speak directly
  if (phrases.length <= 1) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'zh-CN';
    utt.rate = ttsRate;
    utt.pitch = 1.05;
    if (ttsVoice) utt.voice = ttsVoice;
    speechSynthesis.speak(utt);
    return;
  }

  // Queue each phrase; insert a tiny silent utterance as pause between phrases
  phrases.forEach((phrase, i) => {
    const utt = new SpeechSynthesisUtterance(phrase);
    utt.lang = 'zh-CN';
    utt.rate = ttsRate;
    utt.pitch = 1.05;
    if (ttsVoice) utt.voice = ttsVoice;
    speechSynthesis.speak(utt);

    // Insert micro-pause after each phrase except last
    if (i < phrases.length - 1) {
      const pause = new SpeechSynthesisUtterance(' ');
      pause.lang = 'zh-CN';
      pause.rate = ttsRate;
      pause.volume = 0;
      if (ttsVoice) pause.voice = ttsVoice;
      speechSynthesis.speak(pause);
    }
  });
}

const AC = new (window.AudioContext || window.webkitAudioContext || function(){})();
function playDing() {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(.3,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);
    o.start(); o.stop(AC.currentTime+.4);
  } catch {}
}
function playBuzz() {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type='sawtooth'; o.frequency.value=140;
    g.gain.setValueAtTime(.25,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.35);
    o.start(); o.stop(AC.currentTime+.35);
  } catch {}
}

function qzPick(btn, hz) {
  const w = qzWords[qzIdx];

// Nhóm từ theo chủ đề ngữ nghĩa (cùng phạm trù dễ gây nhầm lẫn khi học, dù chữ Hán không liên quan)
const SEMANTIC_GROUPS = [
  ['白','白色','黑','红','绿','蓝'],
  ['东边','西边','南边','北边','里边','外边','上边','下边','前边','后边','左边','右边','中间','里'],
  ['星期一','星期二','星期三','星期四','星期五','星期六','星期天','星期'],
  ['爸爸','妈妈','哥哥','姐姐','弟弟','妹妹'],
  ['一','二','三','四','五','六','七','八','九','十','百','千','万','零'],
  ['人民币','美元','港币','日元','欧元'],
  ['早上','上午','中午','下午','晚上','早','晚'],
  ['今天','明天','昨天','今年','去年','明年','后年'],
  ['中国','中文','英国','英文','美国','法国','法文','德国','德语','韩国','韩文','日本（国）','日文','俄国','俄文','西班牙语','西班牙文','阿拉伯语','日语','英语','法语','俄语','韩国语'],
  ['个','位','本','张','支','辆','件','条','层','座','道','遍','片','斤','公斤','瓶','块'],
];
let _semanticMap = null;
function getSemanticMap() {
  if (_semanticMap) return _semanticMap;
  _semanticMap = {};
  SEMANTIC_GROUPS.forEach(g => {
    g.forEach(h => {
      if (!_semanticMap[h]) _semanticMap[h] = new Set();
      g.forEach(h2 => { if (h2 !== h) _semanticMap[h].add(h2); });
    });
  });
  return _semanticMap;
}

// Bản đồ tra nhanh: chữ Hán -> tập các chữ Hán "dễ nhầm" cùng nhóm (từ CONFUSE_GROUPS)
let _confuseMap = null;
function getConfuseMap() {
  if (_confuseMap) return _confuseMap;
  _confuseMap = {};
  CONFUSE_GROUPS.forEach(g => {
    const hzs = g.chars.map(c => c.hz);
    hzs.forEach(h => {
      if (!_confuseMap[h]) _confuseMap[h] = new Set();
      hzs.forEach(h2 => { if (h2 !== h) _confuseMap[h].add(h2); });
    });
  });
  return _confuseMap;
}

// Từ nối/hư từ tiếng Việt hay lặp lại trong bản dịch — bỏ qua để so khớp ngữ nghĩa chính xác hơn
const VI_STOPWORDS = new Set(['và','là','có','của','một','rất','này','đó','với','hay','cũng','cần','cho','khi','ra','lên','xuống','trong','ngoài','trước','sau','gì','nào','thế','làm','đi','đến','ở','ạ','thì','còn','sẽ','đã','đang','bị','được','như','các','những','vì','nên','mà','nếu','nữa','chỉ','vẫn','phải','không','hoặc']);
function viTokens(vi) {
  return (vi || '').toLowerCase()
    .replace(/[()]/g, '')
    .split(/[,\/;]|\s+/)
    .map(t => t.trim())
    .filter(t => t.length > 1 && !VI_STOPWORDS.has(t));
}

function qzMakeOpts(w) {
  const all = getFilteredWords();
  const confuseSet = getConfuseMap()[w.hz];
  const wTokens = viTokens(w.vi);
  // Chấm điểm mức độ "dễ nhầm" của mỗi từ so với từ đang hỏi:
  // 1) cùng nhóm dễ nhầm đã định nghĩa (hình dạng/âm giống nhau) > 2) trùng ký tự Hán
  // > 3) trùng từ khoá trong nghĩa (ngữ nghĩa giống nhau) > 4) cùng phân loại/bài học > 5) độ dài giống nhau
  const scored = all.filter(x => x.hz !== w.hz).map(x => {
    let s = 0;
    if (confuseSet && confuseSet.has(x.hz)) s += 12;
    const semSet = getSemanticMap()[w.hz];
    if (semSet && semSet.has(x.hz)) s += 8;
    for (const c of w.hz) { if (x.hz.includes(c)) s += 3; }
    const xTokens = viTokens(x.vi);
    s += xTokens.filter(t => wTokens.includes(t)).length * 4;
    if (w.cat && x.cat === w.cat) s += 3;
    if (x.l === w.l) s += 1;
    if (x.hz.length === w.hz.length) s += 0.5;
    return {x, s};
  });
  scored.sort((a,b) => b.s - a.s);
  // Các từ điểm rất cao (trùng nhóm dễ nhầm đã định nghĩa, hoặc trùng nhiều ký tự/nghĩa) luôn được ưu tiên chọn,
  // phần còn lại mới xáo trộn ngẫu nhiên để câu hỏi không lặp lại y hệt mỗi lần
  const mustInclude = scored.filter(p => p.s >= 8).slice(0, 3).map(p => p.x);
  const restPool = scored.filter(p => p.s < 8).slice(0, 12).map(p => p.x);
  let distractors = mustInclude.slice(0, 3);
  if (distractors.length < 3) {
    distractors = distractors.concat(shuffle(restPool).slice(0, 3 - distractors.length));
  }
  return shuffle([w, ...distractors]);
}

function qzRank(r) {
  if(r>=.9) return '🏆 Xuất sắc'; if(r>=.7) return '👍 Tốt'; if(r>=.5) return '📚 Cần ôn'; return '🔄 Học lại';
}

function renderListen() {

}
function lsSetCount(v) { questionCount=parseInt(v); bindListen(); }

function bindListen() {
  // Chỉ dùng TỪ VỰNG của (các) bài đang chọn — không trộn câu ví dụ nữa
  const baseWords = getFilteredWords();
  const items = baseWords.map(w => ({ type: 'word', data: w }));
  lsItems = shuffle(items).slice(0, questionCount);
  lsIdx=0; lsScore=0; lsRenderQ();
}

function lsRenderQ() {
  const area = document.getElementById('ls-area'); if(!area) return;
  if (lsIdx >= lsItems.length) {
    area.innerHTML=`<div class="panel exam-result"><div class="exam-score">${lsScore}/${lsItems.length}</div><div class="exam-rank">${qzRank(lsScore/lsItems.length)}</div><button class="btn btn-primary" onclick="bindListen()">Làm lại</button></div>`; return;
  }
  const item = lsItems[lsIdx];
  if (item.type === 'sent') {
    lsRenderSent(item.data);
  } else {
    lsRenderWord(item.data);
  }
  // auto-play
  setTimeout(()=>{
    const btn = document.getElementById('ls-play');
    if(btn) btn.click();
  }, 400);
}

function lsRenderSent(s) {
  const area = document.getElementById('ls-area');
  // Build 4 options: the correct sentence + 3 wrong sentences
  const pool = SENTENCES.filter(x=>x.hz!==s.hz);
  const opts = shuffle(pool).slice(0,3);
  opts.push(s);
  const shuffled = shuffle(opts);
  const optHtml = shuffled.map(o=>`
    <button class="listen-opt" onclick="lsPick(this,'${o.hz.replace(/'/g,"\\'")}','${s.hz.replace(/'/g,"\\'")}')">
      ${o.hz}${showPinyin?`<div style="font-size:.7rem;color:var(--muted);margin-top:4px">${o.vi.slice(0,30)}...</div>`:''}
    </button>`).join('');
  area.innerHTML=`<div class="panel">
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">${lsIdx+1}/${lsItems.length} · Nghe và chọn câu đúng</div>
    <div class="listen-sentence">(Bài ${s.l})</div>
    <button id="ls-play" class="listen-play" onclick="speak('${s.hz.replace(/'/g,"\\'")}')" title="Phát lại">🔊</button>
    <div style="font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:14px">Nhấn để phát, rồi chọn câu đúng:</div>
    <div style="display:flex;flex-direction:column;gap:10px">${optHtml}</div>
  </div>`;
}

function lsRenderWord(w) {
  const area = document.getElementById('ls-area');
  const pool = getFilteredWords().filter(x=>x.hz!==w.hz);
  const distractors = qzMakeOpts(w).filter(x=>x.hz!==w.hz).slice(0,3);
  const opts = shuffle([w,...distractors]);
  const optHtml = opts.map(o=>`
    <button class="listen-opt" onclick="lsPickWord(this,'${o.hz}','${w.hz}')">${o.hz}${showPinyin?`<div style="font-size:.7rem;color:var(--muted)">${o.py}</div>`:''}</button>`).join('');
  area.innerHTML=`<div class="panel">
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">${lsIdx+1}/${lsItems.length} · Nghe và chọn chữ Hán đúng</div>
    <button id="ls-play" class="listen-play" onclick="speak('${w.hz}')" title="Phát lại">🔊</button>
    <div class="listen-opts">${optHtml}</div>
  </div>`;
}

function lsPick(btn, chosen, correct) {
  const isCorrect = chosen === correct;
  document.querySelectorAll('#ls-area .listen-opt').forEach(b=>{
    const bv = b.getAttribute('onclick').match(/'([^']+)','[^']+'/)[1];
    if(bv===correct) b.classList.add('correct');
    else if(b===btn && !isCorrect) b.classList.add('wrong');
    b.disabled=true;
  });
  if(isCorrect){playDing();lsScore++;}else playBuzz();
  speak(correct);
  // find the hz for recording
  const sent = SENTENCES.find(s=>s.hz===correct);
  setTimeout(()=>{ lsIdx++; lsRenderQ(); }, 1600);
}

function lsPickWord(btn, chosen, correct) {
  const isCorrect = chosen === correct;
  document.querySelectorAll('#ls-area .listen-opt').forEach(b=>{
    const bv = b.getAttribute('onclick').match(/'([^']+)','[^']+'/)[1];
    if(bv===correct) b.classList.add('correct');
    else if(b===btn && !isCorrect) b.classList.add('wrong');
    b.disabled=true;
  });
  if(isCorrect){playDing();lsScore++;}else playBuzz();
  recordAnswer(correct, isCorrect);
  setTimeout(()=>{ lsIdx++; lsRenderQ(); }, 1400);
}

async function aiGenerate() {
  const area = document.getElementById('ai-area');
  const count = document.getElementById('ai-count-sel').value;
  const words = getFilteredWords();
  if (words.length === 0) { area.innerHTML = `<div class="panel center" style="padding:20px">Chưa có từ vựng nào trong phạm vi đã chọn.</div>`; return; }

  try {

    </div>`).join('');
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function aiGrade(i) {
  const inp = document.getElementById('ai-inp-' + i);
  const resultBox = document.getElementById('ai-result-' + i);
  const answer = inp.value.trim();
  if (!answer) { resultBox.innerHTML = `<div style="color:var(--fail);font-size:.85rem">Bạn chưa nhập câu dịch.</div>`; return; }
  resultBox.innerHTML = `<div style="color:var(--muted);font-size:.85rem">⏳ Đang chấm...</div>`;
  try {
    const res = await fetch('/api/ai/grade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ vietnamese: aiExercises[i].vi, answer }),
    });
    const data = await res.json();
    if (!data.ok) { resultBox.innerHTML = `<div style="color:var(--fail);font-size:.85rem">❌ ${escapeHtml(data.error)}</div>`; return; }
    const r = data.result;
    const scoreColor = r.score >= 8 ? 'var(--ok)' : (r.score >= 5 ? '#e0a500' : 'var(--fail)');
    const errorsHtml = (r.errors && r.errors.length)
      ? `<ul style="margin:6px 0 0 18px;padding:0;font-size:.85rem">${r.errors.map(e => `<li>${escapeHtml(e)}</li>`).join('')}</ul>`
      : `<div style="font-size:.85rem;color:var(--ok);margin-top:4px">✅ Không có lỗi!</div>`;
    resultBox.innerHTML = `
      <div style="border-top:1px dashed var(--border);padding-top:8px;margin-top:4px">
        <div style="font-weight:700;color:${scoreColor}">Điểm: ${r.score}/10</div>
        ${errorsHtml}
        <div style="margin-top:6px;font-size:.85rem"><b>Câu đúng tham khảo:</b> ${escapeHtml(r.correction)}
          <button class="btn btn-sound btn-sm" style="margin-left:6px" onclick="speak('${String(r.correction).replace(/'/g,"\\'")}')">🔊</button>
        </div>
        <div style="margin-top:6px;font-size:.85rem;color:var(--muted)">💬 ${escapeHtml(r.comment)}</div>
      </div>`;
  } catch (e) {
    resultBox.innerHTML = `<div style="color:var(--fail);font-size:.85rem">❌ Lỗi kết nối: ${escapeHtml(e.message)}</div>`;
  }
}

function renderStats() {
  const d=getSRS();
  const all=WORDS.filter(w => selectedBookIds.has(bookOfLesson(w.l)));
  const total=all.reduce((s,w)=>s+(d[w.hz]?.total||0),0);
  const correct=all.reduce((s,w)=>s+(d[w.hz]?.correct||0),0);
  const known=all.filter(w=>d[w.hz]&&d[w.hz].step>=3).length;
  const rate=total?Math.round(correct/total*100):0;
  const bookLabel = [...selectedBookIds].map(id=>BOOKS.find(b=>b.id===id).name).join(', ');
  const levelSelect = levelSelectHtml();

  // lesson bars
  let statLessons = lessonsOfSelection();
  if (!isLoggedIn()) statLessons = statLessons.filter(l => l <= GUEST_MAX_LESSON);
  const barHtml=statLessons.map(l=>{
    const lw=all.filter(w=>w.l===l);
    const lt=lw.reduce((s,w)=>s+(d[w.hz]?.total||0),0);
    const lc=lw.reduce((s,w)=>s+(d[w.hz]?.correct||0),0);
    const r=lt?Math.round(lc/lt*100):0;
    return `<div class="bar-col">
      <div class="bar-pct" style="color:${lessonColor(l)}">${r}%</div>
      <div class="bar-fill" style="height:${r*.6}px;background:${lessonColor(l)}"></div>
      <div class="bar-lbl">B${l}</div>
    </div>`;
  }).join('');

  // weak words
  const weak=all.map(w=>({...w,r:d[w.hz]?.total?(d[w.hz].correct/d[w.hz].total):null}))
    .filter(w=>w.r!==null).sort((a,b)=>a.r-b.r).slice(0,8);
  const weakHtml=weak.map(w=>`<div class="weak-item">
    <span class="weak-hz" style="color:${lessonColor(w.l)}">${w.hz}</span>
    <span class="weak-info">${w.vi}${showPinyin?` · ${w.py}`:''} · ${Math.round(w.r*100)}% đúng</span>
    <button class="btn-sound-sm" onclick="speak('${w.hz}')">🔊</button>
  </div>`).join('');

  return `<div class="panel">
    <div id="book-filter" style="margin-bottom:8px;">${levelSelect}</div>
    <div class="panel-title">Tổng quan · ${bookLabel}</div>

function cpRenderList() {
  const appHz = new Set(WORDS.map(w => w.hz));
  return CONFUSE_GROUPS.map(g => {
    const itemsHtml = g.chars.map((c,i) => `
      ${i>0?'<span class="confuse-vs">vs</span>':''}
      <div class="confuse-item${appHz.has(c.hz)?' in-vocab':''}">

      </div>`).join('');
    return `<div class="confuse-card">
      <div class="confuse-row">${itemsHtml}</div>
      <div class="confuse-tip">💡 ${g.tip}</div>
    </div>`;
  }).join('');
}

function cpStartTest() {
  cpTestMode = true; cpTestScore = 0; cpTestIdx = 0;
  cpTestQueue = shuffle(CONFUSE_GROUPS.slice());
  cpRenderTestQ();
}

function cpRenderTestQ() {
  const area = document.getElementById('cp-area');
  if (cpTestIdx >= cpTestQueue.length) {
    area.innerHTML = `<div class="panel exam-result">
      <div class="exam-score">${cpTestScore}/${cpTestQueue.length}</div>
      <div class="exam-rank">${qzRank(cpTestScore/cpTestQueue.length)}</div>
      <button class="btn btn-primary" onclick="cpStartTest()">Làm lại</button>
      <button class="btn" onclick="cpExitTest()">Xem danh sách</button>
    </div>`;
    return;
  }
  const g = cpTestQueue[cpTestIdx];
  const target = g.chars[Math.floor(Math.random()*g.chars.length)];
  const opts = shuffle(g.chars.slice());
  const optHtml = opts.map(o => `<button class="confuse-test-opt" onclick="cpPick(this,'${o.hz}','${target.hz}')">${o.hz}</button>`).join('');
  area.innerHTML = `<div class="panel">
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">${cpTestIdx+1}/${cpTestQueue.length} · Chọn đúng chữ Hán</div>
    <div style="text-align:center;font-size:1.05rem;font-weight:700;margin-bottom:6px">${target.vi}</div>
    <div style="text-align:center;font-size:.85rem;color:var(--muted);font-style:italic;margin-bottom:14px">${target.py}</div>
    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">${optHtml}</div>
    <div style="margin-top:14px;text-align:center"><button class="btn" onclick="cpExitTest()">✕ Thoát kiểm tra</button></div>
  </div>`;
}

function cpPick(btn, hz, correctHz) {
  document.querySelectorAll('.confuse-test-opt').forEach(b => b.style.pointerEvents = 'none');
  const isCorrect = hz === correctHz;
  if (isCorrect) { btn.classList.add('correct'); cpTestScore++; }
  else {
    btn.classList.add('wrong');
    document.querySelectorAll('.confuse-test-opt').forEach(b => { if (b.textContent === correctHz) b.classList.add('correct'); });
  }
  speak(correctHz);
  setTimeout(() => { cpTestIdx++; cpRenderTestQ(); }, 1200);
}

function cpExitTest() {
  cpTestMode = false;
  document.getElementById('cp-area').innerHTML = cpRenderList();
}

// HSK4 PROGRESS TRACKER
// ════════════════════════════════════════════════════
function computeHSKCoverage() {
  const appHz = new Set(WORDS.map(w => w.hz));
  const srs = getSRS();
  const result = {};
  let totalWords = 0, totalCovered = 0, totalKnown = 0;
  [1,2,3,4].forEach(lvl => {
    const list = HSK_OFFICIAL[lvl] || [];
    let covered = 0, known = 0;
    list.forEach(hz => {
      if (appHz.has(hz)) {
        covered++;
        const s = srs[hz];
        if (s && s.step >= 3) known++;
      }
    });
    result[lvl] = { total: list.length, covered, known };
    totalWords += list.length; totalCovered += covered; totalKnown += known;
  });
  result.overall = { total: totalWords, covered: totalCovered, known: totalKnown };
  return result;
}

function renderHSK() {
  const cov = computeHSKCoverage();
  const pct = cov.overall.total ? Math.round(cov.overall.covered/cov.overall.total*100) : 0;
  const knownPct = cov.overall.total ? Math.round(cov.overall.known/cov.overall.total*100) : 0;

  const levelRows = [1,2,3,4].map(lvl => {
    const c = cov[lvl];
    const p = c.total ? Math.round(c.covered/c.total*100) : 0;
    return `<div class="hsk-level-row">
      <div class="hsk-level-label">
        <span class="lv">HSK ${lvl}</span>
        <span class="ct">${c.covered}/${c.total} từ (${p}%)</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${lessonColor(6+lvl)}"></div></div>
    </div>`;
  }).join('');

  return `
  <div class="panel">
    <div class="hsk-hero">
      <div class="hsk-hero-num">${cov.overall.covered}/${cov.overall.total}</div>
      <div class="hsk-hero-sub">từ vựng HSK1-4 đã có trong app (${pct}%)</div>
      <div class="hsk-bigbar"><div class="hsk-bigbar-fill" style="width:${pct}%"></div></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Đã thuộc thật (⭐ qua SRS, ≥1 ngày)</div>
    <div class="stat-grid" style="grid-template-columns:1fr 1fr;">
      <div class="stat-box"><div class="stat-num" style="color:var(--l8a)">${cov.overall.known}</div><div class="stat-lbl">Từ đã thuộc</div></div>
      <div class="stat-box"><div class="stat-num">${knownPct}%</div><div class="stat-lbl">% trên tổng HSK1-4</div></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Chi tiết theo cấp độ</div>
    ${levelRows}
    <div class="hsk-note">
      📌 Danh sách dựa trên bộ từ vựng HSK1-4 phổ biến (~1200 từ, chuẩn HSK 2.0). Một từ tính "đã có" nếu trùng chữ Hán với từ vựng trong app (bất kể bài học nào); "đã thuộc" là từ đã vượt mốc ôn ≥1 ngày trong SRS. Số liệu chỉ mang tính ước lượng tham khảo, không thay thế kết quả thi thật.
    </div>
  </div>`;
}

async function addVocabManual() {
  const resultEl = document.getElementById('vocab-manual-result');

  const py = document.getElementById('vocab-manual-py').value.trim();
  const vi = document.getElementById('vocab-manual-vi').value.trim();
  const l = parseInt(document.getElementById('vocab-manual-l').value, 10);
  const overwrite = document.getElementById('vocab-manual-overwrite').checked;
  if (!hz || !vi || !Number.isFinite(l) || l < 1) {
    resultEl.textContent = 'Vui lòng nhập đủ Chữ Hán, Nghĩa và Số bài (số nguyên ≥ 1).';
    return;
  }
  resultEl.textContent = 'Đang thêm...';
  try {
    const res = await fetch('/api/admin/vocab/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ words: [{ hz, py, vi, l }], overwrite }),
    });
    const data = await res.json();
    if (!data.ok) { resultEl.textContent = '❌ ' + (data.error || 'Có lỗi xảy ra'); return; }
    if (data.added > 0) {
      resultEl.innerHTML = `✅ Đã thêm từ <b>${hz}</b>. <span style="color:var(--l9a);">Tải lại trang để dùng ngay.</span>`;

      document.getElementById('vocab-manual-py').value = '';
      document.getElementById('vocab-manual-vi').value = '';
      document.getElementById('vocab-manual-l').value = '';
    } else if (data.updated > 0) {
      resultEl.innerHTML = `✅ Đã cập nhật lại từ <b>${hz}</b> (bài ${l}). <span style="color:var(--l9a);">Tải lại trang để dùng ngay.</span>`;
    } else {
      resultEl.textContent = `⚠️ Từ "${hz}" ở bài ${l} đã tồn tại rồi. Tick ô "Ghi đè" nếu muốn cập nhật lại pinyin/nghĩa.`;

  } catch (e) {
    resultEl.textContent = '❌ Không kết nối được máy chủ: ' + e.message;
  }

function downloadVocabTemplate() {
  const ws = XLSX.utils.json_to_sheet([
    { hz: '你好', py: 'nǐ hǎo', vi: 'xin chào', l: 1 },
    { hz: '谢谢', py: 'xièxie', vi: 'cảm ơn', l: 1 },

async function uploadVocabExcel() {
  const input = document.getElementById('vocab-file-input');
  const resultEl = document.getElementById('vocab-import-result');
  const file = input.files && input.files[0];
  if (!file) { resultEl.textContent = 'Chưa chọn file.'; return; }
  resultEl.textContent = 'Đang đọc file...';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows.length) { resultEl.textContent = 'File không có dữ liệu.'; return; }
    const words = rows.map(r => ({
      hz: String(r.hz ?? r['Chữ Hán'] ?? '').trim(),
      py: String(r.py ?? r['Pinyin'] ?? '').trim(),
      vi: String(r.vi ?? r['Nghĩa'] ?? '').trim(),
      l: parseInt(r.l ?? r['Bài'], 10),
    }));
    resultEl.textContent = `Đang nhập ${words.length} dòng...`;
    const overwrite = document.getElementById('vocab-excel-overwrite').checked;
    const res = await fetch('/api/admin/vocab/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ words, overwrite }),
    });
    const data = await res.json();
    if (!data.ok) { resultEl.textContent = '❌ ' + (data.error || 'Có lỗi xảy ra'); return; }
    resultEl.innerHTML = `✅ Đã thêm <b>${data.added}</b> từ mới, cập nhật <b>${data.updated}</b> từ trùng. Bỏ qua ${data.skipped} từ trùng (chưa tick ghi đè), ${data.invalid} dòng thiếu dữ liệu.<br>Tổng số từ đã thêm qua Excel/thủ công: <b>${data.total}</b>.<br><span style="color:var(--l9a);">Tải lại trang để dùng ngay các từ mới.</span>`;
    input.value = '';
  } catch (e) {
    resultEl.textContent = '❌ Không đọc được file: ' + e.message;
  }
}

  try {
    const res = await fetch('/api/admin/users', { headers: authHeaders() });
    const data = await res.json();
    if (!data.ok) { area.textContent = data.error || 'Không tải được danh sách.'; return; }
    area.innerHTML = `<div style="font-size:.78rem;color:var(--muted);margin-bottom:10px;">Tổng ${data.users.length} tài khoản</div>` +
      data.users.map(u => {
        const roleBadge = u.role === 'superadmin'
          ? '<span style="background:var(--l15c);color:var(--l15a);font-size:.68rem;font-weight:800;padding:2px 7px;border-radius:8px;margin-left:6px;">👑 SUPERADMIN</span>'
          : u.role === 'admin'
          ? '<span style="background:var(--l11c);color:var(--l11a);font-size:.68rem;font-weight:800;padding:2px 7px;border-radius:8px;margin-left:6px;">ADMIN</span>'
          : '';
        const canDelete = u.role !== 'superadmin';
        const canReset = u.role !== 'superadmin' || currentRole === 'superadmin';
        const canToggleRole = currentRole === 'superadmin' && u.role !== 'superadmin';
        return `
      <div style="border:1.5px solid #eee;border-radius:12px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <b>${u.username}</b>
            ${roleBadge}
          </div>
          <div style="font-size:.8rem;color:var(--muted);">📚 ${Math.round(u.known/WORDS.length*100)}% (${u.known}/${WORDS.length} từ) · 🔥${u.streak}</div>
        </div>
        <div style="font-size:.72rem;color:var(--muted);margin:4px 0 8px;">Tạo lúc: ${new Date(u.createdAt).toLocaleString('vi-VN')}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${canReset ? `<button class="btn btn-sm" style="background:var(--l9c);color:var(--l9a);" onclick="adminResetUser('${u.key}','${u.username}')">🔄 Reset tiến độ</button>` : ''}
          ${canToggleRole ? `<button class="btn btn-sm" style="background:var(--l11c);color:var(--l11a);" onclick="adminToggleRole('${u.key}','${u.role}')">${u.role==='admin' ? '⬇️ Bỏ quyền admin' : '⬆️ Cấp quyền admin'}</button>` : ''}
          ${canDelete ? `<button class="btn btn-sm" style="background:#fdecea;color:#c0392b;" onclick="adminDeleteUser('${u.key}','${u.username}')">🗑️ Xoá tài khoản</button>` : '<span style="font-size:.72rem;color:var(--muted);align-self:center;">🔒 Được bảo vệ</span>'}
        </div>
      </div>`;
      }).join('');
  } catch {
    area.textContent = 'Không kết nối được máy chủ.';
  }
}
async function adminResetUser(key, username) {
  if (!confirm(`Reset toàn bộ tiến độ học của "${username}"? Không thể hoàn tác.`)) return;
  const res = await fetch(`/api/admin/users/${key}/reset`, { method:'POST', headers: authHeaders() });
  const data = await res.json();
  if (!data.ok) alert(data.error || 'Có lỗi xảy ra');
  adminLoadUsers();
}
async function adminDeleteUser(key, username) {
  if (!confirm(`Xoá vĩnh viễn tài khoản "${username}"? Không thể hoàn tác.`)) return;
  const res = await fetch(`/api/admin/users/${key}/delete`, { method:'POST', headers: authHeaders() });
  const data = await res.json();
  if (!data.ok) alert(data.error || 'Có lỗi xảy ra');
  adminLoadUsers();
}
async function adminToggleRole(key, currentR) {
  const newRole = currentR === 'admin' ? 'user' : 'admin';
  const res = await fetch(`/api/admin/users/${key}/role`, {
    method:'POST',
    headers: { 'Content-Type':'application/json', ...authHeaders() },
    body: JSON.stringify({ role: newRole }),
  });
  const data = await res.json();
  if (!data.ok) alert(data.error || 'Có lỗi xảy ra');
  adminLoadUsers();
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

fetch('/api/visit', { method: 'POST' }).catch(() => {}); // ghi nhận lượt truy cập, không chặn nếu lỗi
// Nạp thêm các từ vựng được admin thêm qua Excel (nếu có), gộp vào bộ từ có sẵn
async function loadExtraVocab() {
  if (isGuest || !authToken) return;
  try {
    const res = await fetch('/api/vocab', { headers: authHeaders() });
    const data = await res.json();
    if (!data.ok || !Array.isArray(data.vocab)) return;
    const seen = new Set(WORDS.map(w => w.hz + '-' + w.l));
    for (const w of data.vocab) {
      const key = w.hz + '-' + w.l;
      if (seen.has(key)) continue;
      seen.add(key);
      WORDS.push(w);
    }
  } catch {
    // Không tải được từ vựng mở rộng thì vẫn dùng bộ từ có sẵn, không chặn app
  }
}

bootAuth().then(() => loadExtraVocab()).then(() => {
  updateStreak();
  render();
});
